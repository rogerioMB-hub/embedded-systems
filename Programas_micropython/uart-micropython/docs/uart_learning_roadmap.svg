<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; fill: #1a1a1a; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; font-weight: 400; fill: #444; }
    .box { fill: #f5f5f5; stroke: #ccc; }

    .c-teal rect  { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text  { fill: #085041; }
    .c-teal .ts   { fill: #0F6E56; }

    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }

    .c-amber rect  { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text  { fill: #633806; }
    .c-amber .ts   { fill: #854F0B; }

    .c-coral rect  { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text  { fill: #712B13; }
    .c-coral .ts   { fill: #993C1D; }
  </style>
</defs>

<!-- Fase 1: PC ↔ Placa -->
<g class="c-teal">
  <rect x="30" y="20" width="620" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Fase 1 — PC ↔ Placa (via Shell do Thonny)</text>
</g>

<!-- Passo 1 -->
<g class="c-teal">
  <rect x="30" y="64" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="91" text-anchor="middle" dominant-baseline="central">1</text>
</g>
<rect x="84" y="64" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="82" dominant-baseline="central">Eco serial</text>
<text class="ts" x="100" y="98" dominant-baseline="central">Aluno envia texto → dispositivo ecoa de volta</text>

<!-- Passo 2 -->
<g class="c-teal">
  <rect x="30" y="118" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="145" text-anchor="middle" dominant-baseline="central">2</text>
</g>
<rect x="84" y="118" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="136" dominant-baseline="central">Controle de LED por char</text>
<text class="ts" x="100" y="152" dominant-baseline="central">'L' liga, 'D' desliga, outros → "char desconhecido"</text>

<!-- Passo 3 -->
<g class="c-teal">
  <rect x="30" y="172" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="199" text-anchor="middle" dominant-baseline="central">3</text>
</g>
<rect x="84" y="172" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="190" dominant-baseline="central">Dicionário: dígitos por extenso</text>
<text class="ts" x="100" y="206" dominant-baseline="central">Chars '1'–'9' retornam string; outros → "char desconhecido"</text>

<!-- Fase 2: Estrutura e robustez -->
<g class="c-purple">
  <rect x="30" y="232" width="620" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="252" text-anchor="middle" dominant-baseline="central">Fase 2 — Estrutura e robustez</text>
</g>

<!-- Passo 4 -->
<g class="c-purple">
  <rect x="30" y="276" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="303" text-anchor="middle" dominant-baseline="central">4</text>
</g>
<rect x="84" y="276" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="294" dominant-baseline="central">Parsing de comandos com terminador</text>
<text class="ts" x="100" y="310" dominant-baseline="central">Leitura de string até '\n'; separa comando e argumento</text>

<!-- Passo 5 -->
<g class="c-purple">
  <rect x="30" y="330" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="357" text-anchor="middle" dominant-baseline="central">5</text>
</g>
<rect x="84" y="330" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="348" dominant-baseline="central">Máquina de estados simples</text>
<text class="ts" x="100" y="364" dominant-baseline="central">Estados IDLE / RECEBENDO / PROCESSANDO; sem bloqueio</text>

<!-- Passo 6 -->
<g class="c-purple">
  <rect x="30" y="384" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="411" text-anchor="middle" dominant-baseline="central">6</text>
</g>
<rect x="84" y="384" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="402" dominant-baseline="central">Buffer e timeout</text>
<text class="ts" x="100" y="418" dominant-baseline="central">Detecta silêncio na linha; descarta frames incompletos</text>

<!-- Fase 3: Placa ↔ Placa -->
<g class="c-amber">
  <rect x="30" y="444" width="620" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="464" text-anchor="middle" dominant-baseline="central">Fase 3 — Placa ↔ Placa</text>
</g>

<!-- Passo 7 -->
<g class="c-amber">
  <rect x="30" y="488" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="515" text-anchor="middle" dominant-baseline="central">7</text>
</g>
<rect x="84" y="488" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="506" dominant-baseline="central">Loopback entre duas UARTs</text>
<text class="ts" x="100" y="522" dominant-baseline="central">Uma placa envia, a outra ecoa; verificação de integridade</text>

<!-- Passo 8 -->
<g class="c-amber">
  <rect x="30" y="542" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="569" text-anchor="middle" dominant-baseline="central">8</text>
</g>
<rect x="84" y="542" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="560" dominant-baseline="central">Modelo controlador–periférico</text>
<text class="ts" x="100" y="576" dominant-baseline="central">Controladora pergunta, periférica responde com leitura de sensor</text>

<!-- Passo 9 -->
<g class="c-amber">
  <rect x="30" y="596" width="44" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="623" text-anchor="middle" dominant-baseline="central">9</text>
</g>
<rect x="84" y="596" width="566" height="44" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="614" dominant-baseline="central">Frame com checksum simples</text>
<text class="ts" x="100" y="630" dominant-baseline="central">XOR byte a byte; receptor valida e rejeita frames corrompidos</text>

<!-- Fase 4: Protocolo -->
<g class="c-coral">
  <rect x="30" y="656" width="620" height="30" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="676" text-anchor="middle" dominant-baseline="central">Fase 4 — Pequeno protocolo completo</text>
</g>

<!-- Passo 10 -->
<g class="c-coral">
  <rect x="30" y="700" width="44" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="52" y="745" text-anchor="middle" dominant-baseline="central">10</text>
</g>
<rect x="84" y="700" width="566" height="80" rx="8" class="box" stroke-width="0.5"/>
<text class="th" x="100" y="722" dominant-baseline="central">Mini-protocolo bidirecional</text>
<text class="ts" x="100" y="742" dominant-baseline="central">SOF + tipo + payload + checksum + EOF</text>
<text class="ts" x="100" y="758" dominant-baseline="central">ACK / NAK; retransmissão em caso de falha</text>
<text class="ts" x="100" y="774" dominant-baseline="central">Compatível Pico ↔ Pico, ESP32 ↔ ESP32, Pico ↔ ESP32</text>
</svg>
